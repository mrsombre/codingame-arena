<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arena Viewer</title>
  <link rel="stylesheet" href="./shared/base.css"/>
  <script type="module">
    (async () => {
      const fallback = document.getElementById('fallback')
      try {
        const res = await fetch('/api/game')
        if (res.ok) {
          const info = await res.json()
          if (info?.name) {
            location.replace(`./${info.name}/`)
            return
          }
        }
      } catch {}
      if (fallback) fallback.hidden = false
    })()
  </script>
</head>
<body class="min-h-screen bg-background text-foreground">
<div class="mx-auto max-w-2xl px-6 py-12">
  <h1 class="font-heading mb-8 text-2xl font-semibold tracking-wider uppercase">Arena Viewer</h1>
  <p id="fallback" hidden class="text-sm text-muted-foreground">No active game configured. Start the arena front server.</p>
</div>
</body>
</html>
