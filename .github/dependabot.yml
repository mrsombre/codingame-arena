version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "tech: Dependency GitHub Actions update"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      go:
        patterns:
          - "*"
    commit-message:
      prefix: "tech: Dependency Go update"

  - package-ecosystem: npm
    directory: /viewer
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      pnpm:
        patterns:
          - "*"
    commit-message:
      prefix: "tech: Dependency pnpm update"
